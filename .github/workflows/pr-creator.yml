name: pr-creator

on:
  push:
    branches-ignore:
      - main

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: create-or-update-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          COMMITS=$(git log origin/main..HEAD --oneline)
          if [ -z "$COMMITS" ]; then
            COMMITS="No changes detected."
          fi
          
          PR_BODY="### Approved changes in this Pull Request:

          \`\`\`
          $COMMITS
          \`\`\`

          *Automated Pull Request created by CI/CD bot.*"

          PR_TITLE="feat: merge changes from ${{ github.ref_name }} to main"

          EXISTING_PR=$(gh pr list --base main --head ${{ github.ref_name }} --json number --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            gh pr create --base main --head ${{ github.ref_name }} --title "$PR_TITLE" --body "$PR_BODY"
            echo "Created a new Pull Request"
          else
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            echo "Updated existing Pull Request #$EXISTING_PR"
          fi
